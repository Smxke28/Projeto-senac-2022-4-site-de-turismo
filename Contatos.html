<!DOCTYPE html>
<html lang="PT-BR">
    <head>
        <meta charset="UTF-8">
        <title>Contatos</title>
        <link rel="stylesheet" href="estilo.css">
        <link rel="icon" href="img/logo.png">
    </head>
    <body>
        <div class="cabecalho">
            <img src="img/logo.png" width="25%"/>
        </div>
        <div class="menu">
            <ul>
                <li><a href="Ibitipoca.html"><img src="img/arvores.png">Ibitipoca</a></li>
                <li><a href="Caminhadas.html"><img src="img/corrida.png">Caminhadas</a></li>
                <li><a href="Pousadas.html"><img src="img/hospedagem.png">Pousadas</a></li>
                <li><a href="Pontos.html"><img src="img/cascata.png">P.Turisticos</a></li>
                <li><a href="Contatos.html"><img src="img/telefone.png">Contatos</a></li>
            </ul>
        </div>
        <header><h1><center>Formulário De Cadastro</center></h1></header>
        <form>

            <fieldset>
                <legend>Dados Pessoais</legend>
                <table>
                    <tr>
                        <td>
                            <label>Nome Completo</label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="text" name="nomec" size="25" placeholder="Digite seu nome completo"><br><br>
                        </td>
                        <td>
                            <input type="radio" name="sexo">Masculino</input>
                            <input type="radio" name="sexo">Feminino</input><br><br>
                        </td>
                    </tr>

                    <tr>
                     <td>
                         <label>Data de Nascimento</label>
                     </td>
                     <td>
                         <label>Estado Civil</label>
                     </td>
                    </tr>
                    <tr>
                     <td>
                         <input type="date" name="datanasc"><br><br>
                     </td>
                     <td>
                         <select>
                             <option value="solteiro">Solteiro(a)</option>
                             <option value="casado">Casado(a)</option>
                         </select><br><br>
                     </td>
                 </tr>
                 <tr>
                     <td>
                         <label>Email</label>
                     </td>
                     <td>
                         <label>Escolaridade</label>
                     </td>
                 </tr>
                 <tr>
                     <td>
                         <input type="email" name="email" palceholder="Informe seu email"><br><br>
                     </td>
                     <td>
                         <select>
                             <option value="0">--Select--</option>
                             <option value="ef">Ensino Fundamental</option>
                             <option value="em">Ensino Médio</option>
                             <option value="es">Ensino Superior</option>
                         </select><br><br>
                     </td>
                     <td>
                         <input type="checkbox" name="cursando">Cursando</input><br><br>
                     </td>
                 </tr>
                </table>
            </fieldset><br>
            <button type="submit" name="enviar">Enviar</button>
            <button type="reset" name="limpar">Limpar</button>
        </form>
    </body>
</html>
